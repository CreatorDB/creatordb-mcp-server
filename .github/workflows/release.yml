name: Release to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a version that supports Trusted Publishing
        # Trusted Publishing requires npm >= 11.5.1; Node 22 ships with npm 10.x.
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm via Trusted Publishing
        # No NPM_TOKEN needed — npm CLI exchanges the GitHub OIDC token for a
        # short-lived npm publish token automatically when:
        #   1. The workflow has `permissions: id-token: write` (above)
        #   2. The package is configured with a Trusted Publisher on npm pointing
        #      at this repo + workflow file
        # --provenance attests via sigstore that the package was built from this
        # exact public commit in this exact workflow — visible on the npm page.
        run: npm publish --access public --provenance
